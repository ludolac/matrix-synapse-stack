apiVersion: v1
entries:
  matrix-synapse:
  - annotations:
      artifacthub.io/changes: |
        - kind: changed
          description: "Major version 3.0.0 — chart is now a streamlined fork of the 1.8.x line (no MAS / synapse-admin / PDB). The 2.x.x line (with MAS) remains available via the `2` git history branch and previous tags."
        - kind: added
          description: rtc.livekit.service.publicIP to override LiveKit's STUN-based IP detection (fix ICE handshake on OVH MKS / cloud LBs). Emits node_ip in the LiveKit config (LiveKit v1.11+ syntax).
        - kind: removed
          description: Matrix Authentication Service (MAS) integration and related templates (mas-*, synapse-admin-*, pdb.yaml). Synapse delegated auth (MSC3861) is no longer wired in 3.0.0.
      artifacthub.io/prerequisites: |
        - CloudNativePG operator (required when postgresql.mode=cnpg, the default)
    apiVersion: v2
    appVersion: 1.151.0
    created: "2026-04-28T13:52:04.591201989Z"
    description: A Helm chart for deploying Matrix Synapse with Element Web and Coturn
      TURN server on Kubernetes
    digest: c9797f9e0e6195867633c46f0e4ae31ced3a2da6fc47bf57abfab34407591a76
    home: https://matrix.org
    icon: https://matrix.org/images/matrix-logo.svg
    keywords:
    - matrix
    - synapse
    - element
    - coturn
    - turn
    - webrtc
    - chat
    - messaging
    - video-calls
    - group-calls
    - matrixrtc
    - livekit
    - element-call
    - cnpg
    - cloudnative-pg
    maintainers:
    - email: contact@waadoo.ovh
      name: WAADOO
    name: matrix-synapse
    sources:
    - https://github.com/element-hq/synapse
    - https://github.com/element-hq/element-web
    - https://github.com/element-hq/element-call
    - https://github.com/element-hq/lk-jwt-service
    - https://github.com/livekit/livekit
    - https://github.com/coturn/coturn
    - https://github.com/cloudnative-pg/cloudnative-pg
    type: application
    urls:
    - https://ludolac.github.io/matrix-synapse-stack/matrix-synapse-3.0.1.tgz
    version: 3.0.1
  - annotations:
      artifacthub.io/changes: |
        - kind: fixed
          description: "sysctlTuner DaemonSet: force decimal int rendering of rmemMax/wmemMax (Helm was emitting 7.5e+06 scientific notation, rejected by sysctl -w)"
        - kind: fixed
          description: "rtc.livekit.congestionControl.probeMode now optional — emitting it crashed LiveKit v1.11.0 (the field is not in any released LiveKit version, only on upstream master). Default empty string omits the field for backward compat."
        - kind: added
          description: "rtc.livekit.room.enabledCodecs (default H.264 first → iOS hardware accel + VP8 fallback for browsers)"
        - kind: added
          description: "rtc.livekit.congestionControl.allowPause (dynacast pauses unsubscribed simulcast layers, saves CPU on iOS publishers)"
        - kind: added
          description: "rtc.livekit.packetBufferSize{Video,Audio} application-level RTP buffers (compensate kernel rmem cap on managed K8s)"
        - kind: added
          description: "rtc.livekit.sysctlTuner DaemonSet (workaround net.core.rmem_max on OVH MKS / GKE / EKS, opt-in)"
        - kind: added
          description: "coturn.service.exposeTurnsHttps to expose TURNS on port 443/TCP for clients behind HTTPS-only firewalls"
        - kind: changed
          description: "LiveKit defaults tuned for Element Call quality with iOS clients (Element X)"
      artifacthub.io/prerequisites: |
        - CloudNativePG operator v1.25+ (required when postgresql.mode=cnpg, the default)
        - Traefik v3.x (for RTC and MAS Ingresses if those features are enabled)
