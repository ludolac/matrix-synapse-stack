apiVersion: v2
name: matrix-synapse
description: A Helm chart for deploying Matrix Synapse with Element Web and Coturn TURN server on Kubernetes
type: application
version: 1.8.0
appVersion: "1.151.0"
keywords:
  - matrix
  - synapse
  - element
  - coturn
  - turn
  - webrtc
  - chat
  - messaging
  - video-calls
  - group-calls
  - matrixrtc
  - livekit
  - element-call
  - cnpg
  - cloudnative-pg
home: https://matrix.org
icon: https://matrix.org/images/matrix-logo.svg
sources:
  - https://github.com/element-hq/synapse
  - https://github.com/element-hq/element-web
  - https://github.com/element-hq/element-call
  - https://github.com/element-hq/lk-jwt-service
  - https://github.com/livekit/livekit
  - https://github.com/coturn/coturn
  - https://github.com/cloudnative-pg/cloudnative-pg
maintainers:
  - name: WAADOO
    email: contact@waadoo.ovh
annotations:
  # When postgresql.mode=cnpg (default), the CloudNativePG operator must be
  # installed cluster-wide BEFORE deploying this chart.
  # https://cloudnative-pg.io/documentation/current/installation_upgrade/
  artifacthub.io/prerequisites: |
    - CloudNativePG operator (required when postgresql.mode=cnpg, the default)
