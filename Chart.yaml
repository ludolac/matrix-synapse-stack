apiVersion: v2
name: matrix-synapse
description: Helm chart for a full Matrix stack (Synapse, Element Web, MAS, Element Call, Coturn, CloudNativePG) on Kubernetes
type: application
version: 2.0.51
appVersion: "1.153.0"
keywords:
  - matrix
  - synapse
  - element
  - coturn
  - turn
  - webrtc
  - chat
  - messaging
  - video-calls
  - group-calls
  - matrixrtc
  - livekit
  - element-call
  - mas
  - matrix-authentication-service
  - msc3861
  - oidc
  - cnpg
  - cloudnative-pg
home: https://matrix.org
icon: https://matrix.org/images/matrix-logo.svg
sources:
  - https://github.com/element-hq/synapse
  - https://github.com/element-hq/element-web
  - https://github.com/element-hq/element-call
  - https://github.com/element-hq/lk-jwt-service
  - https://github.com/element-hq/matrix-authentication-service
  - https://github.com/livekit/livekit
  - https://github.com/coturn/coturn
  - https://github.com/cloudnative-pg/cloudnative-pg
maintainers:
  - name: WAADOO
    email: contact@waadoo.ovh
annotations:
  # When postgresql.mode=cnpg (default), the CloudNativePG operator must be
  # installed cluster-wide BEFORE deploying this chart.
  # https://cloudnative-pg.io/documentation/current/installation_upgrade/
  artifacthub.io/prerequisites: |
    - CloudNativePG operator v1.25+ (required when postgresql.mode=cnpg, the default)
    - Traefik v3.x (for RTC and MAS Ingresses if those features are enabled)
  # BREAKING CHANGES in 2.0.0:
  # - Introduces mas.enabled for MSC3861 delegated auth via Matrix Authentication Service.
  # - When mas.enabled=true, the legacy Synapse OIDC/password/registration_shared_secret
  #   blocks are removed (they conflict with MSC3861). Admin creation moves to
  #   mas-cli. No in-place migration is provided — wipe + redeploy is expected.
  artifacthub.io/changes: |
    - kind: changed
      description: "Default image bumps to current stable releases : synapse v1.151.0 -> v1.153.0 (CVE-2026-45076/45078 patched), matrix-authentication-service 1.15.0 -> 1.17.0, element-web develop@sha (unstable pin) -> v1.12.20 stable, element-call v0.19.2 -> v0.20.0, livekit-server v1.11.0 -> v1.12.0, coturn 4.10-alpine -> 4.12-alpine, nginx 1.25-alpine -> 1.30-alpine, ketesa default v1.2.0 -> v1.2.1 (fix react-admin useListContext crash). chart appVersion follows synapse (1.153.0). MAS knobs validated for 1.17 : claims_imports.localpart.on_conflict, policy.data.admin_clients, /api/admin/v1/users all stable."
    - kind: added
      description: "mas.upstreamOauth2.providers[].claimsImports.localpartOnConflict : optional knob mapped to claims_imports.localpart.on_conflict. Required value when running a LLDAP→MAS pre-provisioning CronJob alongside upstream OAuth — without on_conflict: add, MAS refuses to link an existing MAS user to the incoming OAuth identity and falls back to the /register/finish path (which prompts for registration_token even though the user is already pre-provisioned)."
    - kind: added
      description: "mas.extraClients + mas.policy.adminClients : declare extra OAuth2 clients in MAS config and grant them admin scope (urn:mas:admin). Enables sidecar automation flows (CronJob LLDAP→MAS pre-provisioning to avoid the registration_token prompt at first SSO login — see element-hq/matrix-authentication-service finish.rs:124 hardcoded token check across both password + upstream OAuth flows)."
    - kind: added
      description: "sydent.email.logoUrl : optional brand logo URL embedded at the top of invite + verification HTML emails (PNG/SVG via HTTPS). Most clients block remote images by default — recipients have to click 'Show images' to see it. Default empty (logo block omitted)."
    - kind: changed
      description: "Default invite + verification email subjects + body switched to French (Waadoo-targeted). Override via .Values.sydent.email.{verifySubject,inviteSubject,inviteSubjectSpace} and .Values.sydent.templates.{invite,verification,verifyResponse} for other locales / branding."
    - kind: added
      description: "sydent.terms.{enabled,masterVersion,termsOfService,privacyPolicy} : serve /_matrix/identity/v2/terms with custom T&Cs URLs. Required to suppress Element's 'identity server has no terms of service' prompt on every 3pid invite. ToS file rendered into the sydent-config ConfigMap and mounted read-only ; bumping version triggers an Element re-consent."
    - kind: added
      description: "sydent: opt-in self-hosted Matrix Identity Server (element-hq/sydent v2.7.0). Replaces vector.im for 3pid (invite-by-email) flows so the invite email sender + template + signurl all live under your domain. Includes Waadoo-branded HTML invite/verification templates (overridable via .Values.sydent.templates). Single-replica StatefulSet + PVC (SQLite). Pair with an external LLDAP→Sydent sync CronJob (umbrella chart) to pre-populate email→MXID bindings without per-user email verification."
    - kind: added
      description: "wellknown.identityServer.{enabled,baseUrl} + element.config.identityServer.{enabled,baseUrl}: make m.identity_server overridable (or removable). When disabled, Element falls back to homeserver-issued 3pid invites so invite emails link to the local Element instance instead of matrix.to / app.element.io."
    - kind: fixed
      description: "sysctlTuner DaemonSet: bind-mount /proc/sys/net to /host-net (outside /proc) to bypass runc proc-safety check (CVE-2024-21626 mitigation rejected mounts from /proc to /proc). 2.0.37 crashed at container creation."
    - kind: fixed
      description: "sysctlTuner DaemonSet: write directly to bind-mounted /proc/sys/net (host hostPath) instead of `sysctl -w`. runc mounts /proc/sys read-only for non-privileged containers, breaking 2.0.35 hardening."
    - kind: security
      description: "sysctlTuner DaemonSet hardened: removed privileged: true and hostPID, replaced with CAP_NET_ADMIN only + readOnlyRootFilesystem + seccomp RuntimeDefault. Reduces blast radius if container is compromised. New values: rtc.livekit.sysctlTuner.nodeSelector and tolerations (default empty — no taint tolerated)."
    - kind: fixed
      description: "sysctlTuner DaemonSet: force decimal int rendering of rmemMax/wmemMax (Helm was emitting 7.5e+06 scientific notation, rejected by sysctl -w)"
    - kind: fixed
      description: "rtc.livekit.congestionControl.probeMode now optional — emitting it crashed LiveKit v1.11.0 (the field is not in any released LiveKit version, only on upstream master). Default empty string omits the field for backward compat."
    - kind: added
      description: "rtc.livekit.room.enabledCodecs (default H.264 first → iOS hardware accel + VP8 fallback for browsers)"
    - kind: added
      description: "rtc.livekit.congestionControl.allowPause (dynacast pauses unsubscribed simulcast layers, saves CPU on iOS publishers)"
    - kind: added
      description: "rtc.livekit.packetBufferSize{Video,Audio} application-level RTP buffers (compensate kernel rmem cap on managed K8s)"
    - kind: added
      description: "rtc.livekit.sysctlTuner DaemonSet (workaround net.core.rmem_max on OVH MKS / GKE / EKS, opt-in)"
    - kind: added
      description: "coturn.service.exposeTurnsHttps to expose TURNS on port 443/TCP for clients behind HTTPS-only firewalls"
    - kind: changed
      description: "LiveKit defaults tuned for Element Call quality with iOS clients (Element X)"
