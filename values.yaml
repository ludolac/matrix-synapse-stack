# Default values for Matrix Synapse Helm chart

# Global settings
global:
  environment: production

# Secrets configuration
secrets:
  # Auto-generate secrets (NOT recommended for production)
  # Set to false and create secrets manually using ./scripts/generate-secrets.sh
  autoGenerate: false

# Bootstrap the target Namespace as part of the chart.
# Useful for GitOps / ArgoCD: the Namespace is created with sync-wave -10 so
# it exists before any PreSync hook runs. Leave disabled for plain
# `helm install --create-namespace` usage.
namespace:
  create: false
  # ArgoCD sync-wave (lower = applied earlier). -10 is conventional for
  # bootstrap resources that must exist before everything else.
  syncWave: "-10"
  # Extra annotations / labels on the Namespace (merged with the defaults).
  annotations: {}
  labels: {}

# Synapse image configuration
synapse:
  image:
    # Using GitHub Container Registry to avoid Docker Hub rate limits
    repository: ghcr.io/element-hq/synapse
    tag: "v1.151.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  # Service account
  serviceAccount:
    create: true
    annotations: {}
    name: ""

  # Pod annotations
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"

  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 991
    runAsGroup: 991
    fsGroup: 991
    seccompProfile:
      type: RuntimeDefault

  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 991
    runAsGroup: 991

  # Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 8008
    federationPort: 8448
    annotations: {}

  # Resource limits and requests
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

  # Server configuration
  server:
    name: matrix.example.com
    # Registration configuration
    registration:
      enabled: false
      allowGuests: false
      requireEmail: true

    # Initial admin user configuration
    # This creates an admin user during initial deployment using a Kubernetes Job
    adminUser:
      enabled: false
      # Username (without @:domain, will be @username:matrix.example.com)
      username: "admin"
      # Password for the admin user
      # IMPORTANT: Change this or provide via secret in production!
      password: "ChangeMe123!"
      # Email address (optional)
      email: ""
      # Make user a server admin
      admin: true
      # Display name (optional)
      displayName: "Administrator"
      # Registration shared secret (required for user creation)
      # Generate with: openssl rand -hex 32
      # IMPORTANT: Change this in production!
      registrationSecret: ""

    # Report stats to matrix.org
    reportStats: false

    # Media storage
    media:
      maxUploadSize: "50M"
      maxImagePixels: "32M"

    # URL previews
    urlPreviews:
      enabled: true

    # Who can publish a room into the public directory. Matches Synapse's
    # `room_list_publication_rules` verbatim — an ordered list of
    # {user_id, alias, room_id, action} rules. Default Synapse behaviour
    # (empty list) = server admins only. Set to a list to override.
    # Docs: https://element-hq.github.io/synapse/latest/usage/configuration/config_documentation.html#room_list_publication_rules
    roomListPublicationRules: []
      # Example — allow any local user to publish any room:
      # - user_id: "*"
      #   alias: "*"
      #   room_id: "*"
      #   action: allow

    # TURN server configuration for VoIP/Video calls
    # TURN (Traversal Using Relays around NAT) is required for WebRTC calls to work
    # when users are behind NAT/firewalls
    turn:
      enabled: false
      # TURN server URIs - supports both UDP/TCP and secure TURNS
      uris: []
        # - "turn:turn.example.com:3478?transport=udp"
        # - "turn:turn.example.com:3478?transport=tcp"
        # - "turns:turn.example.com:5349?transport=udp"  # Secure TURN over TLS
        # - "turns:turn.example.com:5349?transport=tcp"
      # Shared secret is read from Kubernetes secret: matrix-synapse-turn-credentials
      # Generate with: ./scripts/generate-secrets.sh turn
      # DO NOT set sharedSecret here - it's automatically injected from the secret
      sharedSecret: ""  # Deprecated - will be removed, use Kubernetes secret
      # How long TURN credentials are valid
      userLifetime: "1h"

    # Email configuration
    email:
      enabled: false
      smtpHost: localhost
      smtpPort: 25
      smtpUser: ""
      smtpPass: ""
      requireTransportSecurity: true
      notifFrom: "Matrix <noreply@example.com>"
      appName: "Matrix"
      # Public URL of the Element Web instance. Used in room-invite email
      # links (e.g. "Accept invite" button). Leave empty to fall back to
      # Synapse's default (https://app.element.io).
      clientBaseUrl: ""

    # Multi-Factor Authentication (MFA) / Two-Factor Authentication (2FA)
    mfa:
      # Enable TOTP (Time-based One-Time Password) - QR code authentication
      # Note: TOTP is available by default in Synapse, users can enable it via Element Web
      # These settings allow customization of TOTP behavior
      totp:
        enabled: true  # Enable TOTP support (enabled by default)
        # TOTP algorithm (sha1, sha256, sha512)
        algorithm: "sha1"
        # Number of digits in TOTP code (6 or 8)
        digits: 6
        # Time period in seconds for TOTP code validity
        period: 30
        # Brand name shown in authenticator apps
        issuer: "Matrix"

      # WebAuthn/FIDO2 support (hardware security keys like YubiKey)
      webauthn:
        enabled: false
        # Relying Party (RP) ID - usually your domain
        rpId: ""  # e.g., "matrix.example.com"
        # Relying Party name shown to users
        rpName: "Matrix Homeserver"

    # SSO (Single Sign-On) configuration
    sso:
      enabled: false

      # OpenID Connect (OIDC) providers
      oidc:
        enabled: false
        providers: []
        # Example configurations for common providers:
        #
        # # Google
        # - idp_id: google
        #   idp_name: "Google"
        #   idp_icon: "mxc://matrix.org/google-icon"
        #   discover: true
        #   issuer: "https://accounts.google.com/"
        #   client_id: "your-client-id.apps.googleusercontent.com"
        #   client_secret: "your-client-secret"
        #   scopes: ["openid", "profile", "email"]
        #   user_mapping:
        #     localpart_template: "{{ user.email.split('@')[0] }}"
        #     display_name_template: "{{ user.name }}"
        #     email_template: "{{ user.email }}"
        #
        # # GitHub
        # - idp_id: github
        #   idp_name: "GitHub"
        #   discover: false
        #   issuer: "https://github.com/"
        #   client_id: "your-github-client-id"
        #   client_secret: "your-github-client-secret"
        #   authorization_endpoint: "https://github.com/login/oauth/authorize"
        #   token_endpoint: "https://github.com/login/oauth/access_token"
        #   userinfo_endpoint: "https://api.github.com/user"
        #   scopes: ["read:user", "user:email"]
        #   user_mapping:
        #     localpart_template: "{{ user.login }}"
        #     display_name_template: "{{ user.name }}"
        #     email_template: "{{ user.email }}"
        #
        # # Keycloak / Authentik
        # - idp_id: keycloak
        #   idp_name: "Corporate SSO"
        #   discover: true
        #   issuer: "https://sso.example.com/auth/realms/master"
        #   client_id: "matrix"
        #   client_secret: "your-client-secret"
        #   scopes: ["openid", "profile", "email"]
        #   user_mapping:
        #     localpart_template: "{{ user.preferred_username }}"
        #     display_name_template: "{{ user.name }}"
        #     email_template: "{{ user.email }}"
        #   allow_existing_users: true
        #
        # # Azure AD / Entra ID
        # - idp_id: microsoft
        #   idp_name: "Microsoft"
        #   discover: true
        #   issuer: "https://login.microsoftonline.com/{tenant-id}/v2.0"
        #   client_id: "your-application-id"
        #   client_secret: "your-client-secret"
        #   scopes: ["openid", "profile", "email"]
        #   user_mapping:
        #     localpart_template: "{{ user.preferred_username.split('@')[0] }}"
        #     display_name_template: "{{ user.name }}"
        #     email_template: "{{ user.email }}"

      # SAML2 configuration
      saml2:
        enabled: false
        metadata_url: ""  # URL to IdP metadata XML
        entity_id: ""     # Optional: SP entity ID
        mxid_source_attribute: "uid"  # SAML attribute for username
        mxid_mapping: "dotreplace"    # Optional: how to map username

  # Database connection pool (psycopg2). The database host / user / password
  # are derived automatically from the `postgresql` section (cnpg | standalone
  # | external mode). Override here only if you need tuning.
  database:
    cpMin: 5
    cpMax: 10

  # Signing key secret (required)
  signingKey:
    existingSecret: ""
    secretKey: "signing.key"

  # Persistence for media and uploads
  persistence:
    enabled: true
    storageClassName: "standard"
    accessMode: ReadWriteOnce
    size: 10Gi
    mountPath: /data

  # Metrics
  metrics:
    enabled: true
    port: 9090

  # Probes
  livenessProbe:
    httpGet:
      path: /health
      port: 8008
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 8008
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  # Note: Matrix Authentication Service (MAS) integration is now a top-level
  # section `mas:` at the bottom of this file. When `mas.enabled=true`, Synapse
  # is automatically configured with MSC3861 delegated auth and the legacy
  # password_config / oidc_providers / registration_shared_secret blocks are
  # removed (they conflict with MSC3861).

  startupProbe:
    httpGet:
      path: /health
      port: 8008
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30

  # Horizontal Pod Autoscaler for Synapse.
  # NOTE: Synapse single-worker mode (this chart's default) tolerates 2-3
  # replicas in practice — all HTTP routes work, DB writes serialize on the
  # primary. For heavy-load deployments, consider a multi-worker setup (not
  # yet supported by this chart).
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    # Synapse is CPU-bound on regex/crypto/DB hashing. 60% threshold leaves
    # headroom for request spikes before new replicas come online.
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75
    # Optional behavior:
    # behavior:
    #   scaleDown:
    #     stabilizationWindowSeconds: 300

  # PodDisruptionBudget — prevents voluntary eviction of all Synapse replicas
  # at once (cluster drain, node autoscale). Enable only when replicaCount > 1
  # otherwise drain commands block indefinitely.
  pdb:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1     # alternative, mutually exclusive with minAvailable

# Element Web configuration
element:
  enabled: true

  image:
    repository: ghcr.io/element-hq/element-web
    tag: "v1.12.15"
    pullPolicy: IfNotPresent

  replicaCount: 2

  # PodDisruptionBudget for Element Web.
  # User-facing — loss of all replicas kills access for every connected user
  # until one comes back. Enable alongside replicaCount > 1.
  pdb:
    enabled: false
    minAvailable: 1

  # Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
    annotations: {}

  # Resource limits
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Element configuration
  config:
    defaultServerName: matrix.example.com
    defaultServerUrl: "https://matrix.example.com"
    brandingUrl: "https://element.io"
    roomDirectory:
      servers:
        - matrix.org
    welcomeUserId: ""
    # Features
    features:
      showLabsSettings: false
      enableWidgets: true
    # Integration manager
    integrations:
      enabled: true
      uiUrl: "https://scalar.vector.im/"
      restUrl: "https://scalar.vector.im/api"
      widgetsUrls:
        - "https://scalar.vector.im/_matrix/integrations/v1"
        - "https://scalar.vector.im/api"
    # Branding and theming
    branding:
      # Custom logo URL (appears in top-left)
      authHeaderLogoUrl: ""
      # Welcome background image (login/register page)
      welcomeBackgroundUrl: ""
      # Custom CSS for additional styling
      customCssUrl: ""

    # Element Call widget integration (only rendered in config.json when
    # rtc.enabled=true — otherwise Element won't show the group-call button).
    elementCall:
      # Force Element Call for ALL calls, even 1-to-1 DMs. When true, the
      # legacy "Video call" (m.call.invite) button is hidden. Recommended
      # when LiveKit SFU is deployed — unified UX + screen share/raise hand
      # consistently available everywhere.
      useExclusively: false
      # Hint shown to clients (informational, not enforced by the SFU).
      participantLimit: 8
      # Brand name in the widget header. Override with your deployment name.
      brand: "Element Call"

  # Security context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault

# Ingress configuration
ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"

  # Synapse (Matrix homeserver)
  synapse:
    host: matrix.example.com
    paths:
      - path: /
        pathType: Prefix
    tls:
      secretName: matrix-synapse-tls

  # Element Web
  element:
    host: element.example.com
    paths:
      - path: /
        pathType: Prefix
    tls:
      secretName: matrix-element-tls

  # Federation (port 8448)
  federation:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: "matrix-federation"

# Autoscaling for Element
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Well-known server (nginx serving /.well-known/matrix/{server,client}).
# Always deployed (both federation auto-discovery and client auto-config
# depend on it). Section exists so operators can scale it without editing
# the template.
wellknown:
  # 2 replicas by default for HA across nodes. Bump higher for intense
  # federation traffic; drop to 1 for dev/homelab to save resources.
  replicaCount: 2

  image:
    repository: nginx
    tag: "1.25-alpine"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

  # PodDisruptionBudget for wellknown.
  # Federation auto-discovery depends on .well-known — full outage breaks
  # incoming federation until a replica comes back. Enable when replicaCount
  # > 1 (the chart default).
  pdb:
    enabled: false
    minAvailable: 1

# Network policy
# Creates separate NetworkPolicies for each component (Synapse, Element, PostgreSQL, Well-known)
# with fine-grained ingress and egress rules
networkPolicy:
  enabled: false  # Set to true to enable NetworkPolicies

  # Ingress configuration (who can access our pods)
  ingress:
    # Traefik ingress controller configuration
    traefik:
      # Namespace selector for Traefik
      namespaceSelector:
        name: traefik
      # Pod selector for Traefik (optional - if not set, allows from any pod in traefik namespace)
      podSelector: {}

  # Egress configuration (what our pods can access)
  egress:
    # SSO provider configuration (e.g., Authelia)
    sso:
      # Namespace where SSO provider is running
      namespaceSelector:
        kubernetes.io/metadata.name: authentif
      # Pod selector for SSO provider (optional)
      podSelector: {}

# PostgreSQL configuration
#
# Deployment mode:
#   cnpg       -> CloudNativePG operator (HA, recommended for production)
#                 Prerequisite: CNPG operator installed cluster-wide.
#                 Docs: https://cloudnative-pg.io/documentation/
#   standalone -> Single-instance PostgreSQL managed by this chart (no HA).
#                 Use for dev/test or simple homelab setups.
#   external   -> Bring your own PostgreSQL; configure postgresql.external.
postgresql:
  mode: cnpg

  # Common database/user (applies to all modes)
  database: synapse
  username: synapse

  # ---------------------------------------------------------------------------
  # CloudNativePG (HA, recommended)
  # ---------------------------------------------------------------------------
  cnpg:
    # Number of PostgreSQL instances (1 primary + N-1 replicas).
    # 3 = production HA (1 primary, 2 hot standbys). 1 = no HA.
    instances: 3

    # Synchronous replication (0 = asynchronous, safest for write latency).
    # Increase for zero-data-loss guarantees at the cost of write latency.
    minSyncReplicas: 0
    maxSyncReplicas: 0

    # CNPG-compatible PostgreSQL image (must include the CNPG extensions)
    imageName: ghcr.io/cloudnative-pg/postgresql:17.9

    # Storage configuration (one PVC per instance)
    storage:
      size: 20Gi
      storageClass: "standard"

    # Resources per instance
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi

    # PostgreSQL runtime parameters.
    # CNPG manages wal_level / max_wal_senders / max_replication_slots
    # automatically - do not override them here.
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      work_mem: "8MB"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"

    # Bootstrap: initial cluster creation.
    # Locale C / encoding UTF8 is REQUIRED by Synapse.
    bootstrap:
      encoding: UTF8
      localeCollate: C
      localeCType: C

    # Prometheus PodMonitor (scraped by prometheus-operator / VictoriaMetrics)
    monitoring:
      enablePodMonitor: true

    # Spread instances across nodes for HA.
    # Use "required" for hard guarantee (needs enough nodes), "preferred" otherwise.
    affinity:
      enablePodAntiAffinity: true
      topologyKey: kubernetes.io/hostname
      podAntiAffinityType: preferred

    # Scheduling
    nodeSelector: {}
    tolerations: []
    priorityClassName: ""

    # Backups to an S3-compatible object store (Barman Cloud).
    # Requires a pre-existing secret with ACCESS_KEY_ID and ACCESS_SECRET_KEY.
    backup:
      enabled: false
      # Retention policy (e.g. "30d", "7d"). Older base backups are pruned.
      retentionPolicy: "30d"
      # Destination: s3://<bucket>/<path>
      destinationPath: ""
      # S3 endpoint (e.g. OVH: https://s3.gra.cloud.ovh.net)
      endpointURL: ""
      # Secret name holding S3 credentials (ACCESS_KEY_ID / ACCESS_SECRET_KEY)
      s3Credentials:
        secretName: ""
      wal:
        compression: gzip
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 2
      # Optional schedule for automated base backups (cron syntax, UTC).
      # Leave empty to disable scheduled backups (manual only).
      scheduledBackup:
        enabled: false
        schedule: "0 0 3 * * *"  # daily at 03:00 UTC
        immediate: true

  # ---------------------------------------------------------------------------
  # Standalone (single-instance, no HA)
  # ---------------------------------------------------------------------------
  standalone:
    image:
      repository: postgres
      tag: "17-alpine"
      pullPolicy: IfNotPresent

    replicaCount: 1

    # Password should be provided via a Kubernetes secret created out-of-band.
    # If set here, a secret named <release>-postgresql is created with this value.
    postgresPassword: ""

    # Synapse requires C locale + UTF8 encoding
    initdbArgs: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"

    # Post-install/upgrade job to align the DB password with the secret.
    # Only needed for password rotation or migration scenarios.
    passwordFixJob:
      enabled: false

    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 999

    persistence:
      storageClassName: "standard"
      size: 20Gi

    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi

    config:
      maxConnections: 200
      sharedBuffers: "256MB"
      effectiveCacheSize: "1GB"
      maintenanceWorkMem: "64MB"
      workMem: "8MB"
      # Single-instance: no replication needed
      walLevel: "minimal"
      maxWalSenders: 0

      # Logging
      logMinDurationStatement: 1000
      logConnections: true
      logDisconnections: true
      logStatementLevel: "notice"
      logStatement: "none"
      logErrorVerbosity: "default"
      logLinePrefix: "%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h "
      logLockWaits: false
      logTempFiles: -1
      logAutovacuumMinDuration: -1

  # ---------------------------------------------------------------------------
  # External (BYO PostgreSQL)
  # ---------------------------------------------------------------------------
  external:
    host: ""
    port: 5432
    # Existing secret containing the DB password under passwordKey
    existingSecret:
      name: ""
      passwordKey: "password"

# Coturn TURN Server Configuration
# Integrated TURN server for WebRTC video/voice calls
# Automatically configured with Matrix Synapse
coturn:
  # Enable coturn TURN server deployment
  enabled: false
  
  # Number of coturn replicas
  replicaCount: 1
  
  # Coturn container image
  image:
    repository: coturn/coturn
    tag: "4.10-alpine"
    pullPolicy: IfNotPresent

  imagePullSecrets: []
  
  # External IP address for TURN relay
  # This should be the public IP where clients can reach the TURN server
  externalIP: ""
  
  # Realm for TURN authentication. Must match the homeserver name for Synapse
  # shared-secret validation to succeed. Leave empty to auto-derive from
  # synapse.server.name (recommended — the previous `turn.example.com` default
  # was a common source of "401 Unauthorized" on TURN).
  realm: ""
  
  # Relay port range for media traffic
  # These ports need to be opened in firewall/security groups
  relayPortRange:
    min: 49152
    max: 49252  # 100 ports (adjust based on expected concurrent calls)

  # Note: User/group privileges are managed by Kubernetes securityContext
  # The coturn container runs as UID/GID 65534 (nobody:nogroup)

  # Resource quotas to prevent abuse
  userQuota: 0        # 0 = no per-user quota
  totalQuota: 100     # Maximum 100 concurrent sessions
  
  # Bandwidth limits (bytes per second)
  maxBps: 0           # 0 = no per-session limit
  bpsCapacity: 0      # 0 = no total capacity limit
  
  # TLS configuration for TURNS (secure TURN)
  tls:
    enabled: false
    # Name of the Kubernetes secret containing tls.crt and tls.key
    secretName: "coturn-tls"
  
  # Prometheus metrics exporter
  prometheusExporter:
    enabled: false
    port: 9641
  
  # Service configuration
  service:
    # Service type: LoadBalancer, NodePort, or ClusterIP
    type: LoadBalancer

    # Publish the whole relayPortRange on the Service.
    # Required when coturn sits behind a LoadBalancer, otherwise media
    # traffic cannot reach the pod (only signaling on 3478/5349 works).
    # WARNING: Kubernetes caps a Service at ~32 ports — keep the range small
    # ((max - min) <= 27, leaving room for signaling + metrics) or use
    # hostNetwork on the pod if you need a larger range.
    publishRelayPorts: false

    # Load balancer IP (optional)
    loadBalancerIP: ""
    
    # External traffic policy (Local or Cluster)
    # Local preserves source IP but requires externalTrafficPolicy support
    externalTrafficPolicy: "Cluster"
    
    # External IPs for the service (optional)
    externalIPs: []
    
    # NodePort configuration (when type=NodePort)
    nodePorts:
      turnUdp: null   # e.g., 30478
      turnTcp: null
      turnsUdp: null  # e.g., 30349
      turnsTcp: null
    
    # Service annotations
    annotations: {}
      # metallb.universe.tf/address-pool: default
      # metallb.universe.tf/allow-shared-ip: coturn
    
    # external-dns configuration
    externalDns:
      enabled: false
      hostname: "turn.example.com"
      ttl: 300
  
  # Ingress configuration for TURNS (TLS)
  # Note: Ingress typically only handles HTTPS/TCP, not UDP
  # For full functionality, use LoadBalancer or NodePort service
  ingress:
    enabled: false
    ingressClassName: ""
    hostname: "turn.example.com"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"
    tls:
      secretName: "coturn-tls"
  
  # Pod annotations
  podAnnotations: {}
    # prometheus.io/scrape: "true"
    # prometheus.io/port: "9641"
  
  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534  # nobody
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  
  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE  # Required for binding to ports < 1024
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
  
  # Resource limits and requests
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 128Mi
  
  # Node selector
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Logging configuration
  logging:
    # Set logging verbosity level
    # Options: "verbose" (default - logs everything), "normal" (moderate), "quiet" (errors only)
    level: "verbose"
    # Log file destination (stdout for container logs)
    file: "stdout"

  # Affinity
  affinity: {}

  # Extra configuration to append to turnserver.conf
  extraConfig: ""
    # Example:
    # |
    # # Custom configuration
    # cli-password=mypassword

# ==============================================================================
# Matrix Authentication Service (MAS)
# ==============================================================================
# Deploys MAS as the authentication/authorization backend for Synapse.
# When enabled, Synapse delegates auth via MSC3861 (OAuth2) and the legacy
# password/OIDC/registration_shared_secret paths are removed from the Synapse
# config (they are incompatible with MSC3861).
#
# Prerequisites:
#   - CNPG operator (CRD `Database` from CNPG 1.25+) — the chart provisions a
#     dedicated DB `mas_prod` in the existing postgresql.cnpg cluster.
#   - An upstream OIDC IdP (e.g. Authelia) — used by MAS to authenticate users.
#   - DNS record: auth.<domain>
#
# Bootstrap flow (no legacy migration — wipe + redeploy):
#   1. Generate cryptographic material: scripts/generate-mas-secrets.sh
#   2. Create Kubernetes secret referenced by mas.existingSecret
#   3. Deploy the chart with mas.enabled=true
#   4. User logs in once via Authelia (creates MAS account linked to OIDC)
#   5. Promote to admin: kubectl exec deploy/<release>-mas -- mas-cli manage \
#        set-admin <localpart> --admin
#
# See README section "Matrix Authentication Service (MAS)" for details.
mas:
  enabled: false

  # Enable device-to-device QR code sign-in (MSC4108). Only meaningful with
  # mas.enabled=true: the feature requires delegated auth. Disable only if you
  # want to enforce non-QR flows for some reason.
  qrCodeLoginEnabled: true

  # Expose the MAS admin API (`adminapi` resource on the main HTTP listener).
  # Required by Ketesa (synapseAdmin.*) and other external admin UIs to
  # manage registration tokens, user sessions, email addresses, etc.
  # Off by default to keep the surface minimal.
  adminApiEnabled: false

  # Account behavior flags (MAS `account:` config section).
  # Defaults keep the chart in OIDC-only mode — flip passwordRegistrationEnabled
  # to true to allow local password accounts alongside upstream OIDC (useful
  # for invite-only provisional accounts without adding users in Authelia).
  account:
    # Allow creating local password-based accounts via /register (in addition
    # to upstream OIDC). When false, users must sign in via an upstream IdP.
    passwordRegistrationEnabled: false

    # When password registration is enabled: require an email during signup.
    # Recommended for account recovery and audit.
    passwordRegistrationEmailRequired: true

    # When password registration is enabled: require a pre-issued registration
    # token (generated by admin via `mas-cli manage issue-user-registration-token`).
    # Effectively makes registration invite-only — strongly recommended.
    registrationTokenRequired: true

    # Allow users to sign in with their email address instead of their local
    # Matrix handle (@alice:example.com). Off by default.
    loginWithEmailAllowed: false

  # Email configuration (SMTP relay).
  # Without this, MAS logs "An email was supposed to be sent but no email
  # backend is configured" on every password reset, registration token
  # delivery, email verification, etc. — users don't receive anything.
  # Leave `hostname` empty to skip the email block entirely (OIDC-only
  # deployments without password registration don't need email).
  #
  # For password safety: set `password` to "${EMAIL_PASSWORD}" and add
  # `EMAIL_PASSWORD` to your `mas.existingSecret`. The render-config init
  # container will substitute it at pod startup (avoids plain-text in etcd).
  email:
    from: "Matrix <noreply@example.com>"
    replyTo: ""                       # optional, defaults to `from`
    transport: smtp                    # smtp | sendmail | blackhole
    mode: plain                        # plain | tls | starttls
    hostname: ""                       # SMTP relay host — empty disables email
    port: 587
    username: ""
    password: ""

  image:
    repository: ghcr.io/element-hq/matrix-authentication-service
    tag: "1.15.0"
    pullPolicy: IfNotPresent

  # 2 replicas by default — MAS is in the hot path of every OAuth2 token
  # exchange, so a single-pod SPoF would lock out every Element/ElementX
  # session on pod restart. Bump to 3+ for heavy traffic. MAS is stateless
  # (all state lives in PostgreSQL), scaling is linear.
  replicaCount: 2

  # Horizontal Pod Autoscaler for MAS.
  # MAS is fully stateless (all state in PostgreSQL) — HPA is safe to enable.
  # Typical CPU spikes happen on login bursts and token refresh storms.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    # behavior:
    #   scaleDown:
    #     stabilizationWindowSeconds: 300

  # PodDisruptionBudget for MAS.
  # Critical — MAS is in the auth path of every client. Recommend enabling
  # alongside the default replicaCount: 2 so cluster drains keep at least
  # one MAS pod running.
  pdb:
    enabled: false
    minAvailable: 1

  # Public URL of MAS — advertised via .well-known and used by Synapse as the
  # OAuth2 issuer. Must match the Ingress host. Pick a hostname dedicated to
  # MAS (e.g. mas.<domain>) — do NOT reuse the hostname of your upstream IdP
  # (Authelia / Keycloak) since both need to be reachable independently.
  publicUrl: "https://mas.example.com/"

  # Database. MAS requires its own PostgreSQL database (not shared with Synapse).
  # When postgresql.mode=cnpg, the chart can provision a dedicated DB via the
  # CNPG `Database` CRD inside the existing cluster.
  database:
    # cnpg: use the chart's existing CNPG cluster and provision mas_prod there
    # external: use an external PostgreSQL, credentials via existingSecret
    mode: cnpg

    # Name of the database and owner role (when mode=cnpg)
    name: mas_prod
    username: mas

    # When mode=external: point to an existing secret with keys
    # DATABASE_HOST, DATABASE_PORT, DATABASE_NAME, DATABASE_USERNAME,
    # DATABASE_PASSWORD.
    external:
      existingSecret: ""

  # Upstream OIDC provider(s) — MAS delegates authentication to these.
  # At least one provider is required. Leave the list empty to disable MAS.
  upstreamOauth2:
    providers: []
      # Example for Authelia:
      # - id: authelia
      #   issuer: "https://authelia.example.com"
      #   clientId: "matrix"          # reuse existing Authelia OIDC client
      #   # Secret key name inside mas.existingSecret holding the client secret:
      #   clientSecretKey: "AUTHELIA_CLIENT_SECRET"
      #   scope: "openid profile email"
      #   claimsImports:
      #     localpart: "{{ user.preferred_username }}"
      #     displayname: "{{ user.name }}"
      #     email: "{{ user.email }}"

  # Secrets for MAS (encryption key, signing keys, Synapse shared secret,
  # admin token). Generate with scripts/generate-mas-secrets.sh and reference
  # the resulting Secret here. The chart will NOT auto-generate these (RSA
  # keys cannot be safely generated from Helm templates).
  existingSecret: ""  # e.g., "matrix-synapse-mas-secrets"

  # Ingress (HTTPS UI + OAuth endpoints). MAS listens on 8080 internally.
  ingress:
    className: "traefik"
    # Must match the hostname in publicUrl above.
    host: "mas.example.com"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"
    tls:
      secretName: "matrix-mas-tls"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ==============================================================================
# Ketesa (web UI for Matrix admin operations, formerly known as synapse-admin)
# ==============================================================================
# Ketesa is a React SPA that exposes the Synapse Admin API (and the MAS admin
# API when deployed together) behind a convenient web UI: user listing,
# deactivation, room management, media quarantine, server stats, and
# **registration token administration** (both Synapse and MAS tokens).
#
# The project was renamed from "etkecc/synapse-admin" to "etkecc/ketesa" —
# same codebase. The Helm values key stays `synapseAdmin` to avoid breaking
# existing deployments.
#
# Scope:
#   - Does NOT replace MAS — you still need MAS (or legacy OIDC) to log in.
#   - Does NOT bypass Synapse's admin permission model — the user logging in
#     must already be a server admin (via `mas-cli manage set-admin` or the
#     equivalent in non-MAS mode).
synapseAdmin:
  enabled: false

  image:
    # New canonical image path (project rename — see upstream:
    # https://github.com/etkecc/ketesa).
    repository: ghcr.io/etkecc/ketesa
    tag: "v1.2.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  # Restrict the homeservers this UI can talk to. STRONGLY recommended —
  # without this, anyone reaching the UI could try to admin arbitrary other
  # homeservers by typing their URL in the login form.
  # Accepts a single URL (string) or a list of URLs.
  # Leave empty to allow any homeserver (insecure, dev only).
  restrictBaseUrl: ""  # e.g., "https://matrix.example.com"

  # Set to true when your homeserver uses MAS (delegated auth). synapse-admin
  # adjusts its flow to play nicely with OIDC sessions.
  # Auto-defaulted to the same value as mas.enabled when left at null/empty.
  externalAuthProvider: null

  # CORS credential behavior for admin API requests. "include" is needed
  # when the homeserver is on a different origin and auth cookies must
  # travel along. "same-origin" is the safe default.
  corsCredentials: "same-origin"

  # Regex patterns for system / appservice-managed users that must be
  # protected from accidental edits via the UI.
  asManagedUsers: []
    # - "^@_.*:example\\.com$"
    # - "^@bot\\..*:example\\.com$"

  # Custom menu entries (shown in the sidebar).
  menu: []
    # - label: "Documentation"
    #   icon: "menu_book"
    #   url: "https://example.com/docs"

  # HTTPS Ingress — synapse-admin listens on container port 8080.
  # Default hostname follows the `matrix-*` naming scheme to stay grouped with
  # the other Matrix subdomains (matrix.*, matrix-rtc.*). Override in your
  # values-prod if you prefer another scheme.
  ingress:
    className: "traefik"
    host: "matrix-admin.example.com"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"
    tls:
      secretName: "matrix-admin-tls"

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 32Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 101

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ==============================================================================
# MatrixRTC / Element Call (group video calls)
# ==============================================================================
# Deploys the LiveKit SFU + lk-jwt-service + Element Call SPA required for
# group video/voice calls (MSC3401 + MSC4143 + MSC4195).
#
# Architecture:
#   - LiveKit SFU: media server (WebRTC), exposed via HTTPS (WSS) for
#     signaling and via a dedicated UDP LoadBalancer for media (muxed).
#   - lk-jwt-service: authorization service, validates Matrix OpenID tokens
#     and issues short-lived LiveKit JWTs.
#   - Element Call (SPA): web app loaded as widget/iframe by Element Web or
#     ElementX, opened at rtc.ingress.call.host.
#   - Synapse is automatically configured with experimental_features
#     msc3266_enabled + msc4140_enabled (delayed events) when rtc.enabled=true.
#   - The well-known server advertises org.matrix.msc4143.rtc_foci so clients
#     can discover the backend.
#
# Prerequisites:
#   - A second OVH LoadBalancer for the muxed UDP port (cost: ~5€/month).
#   - DNS records: call.<domain> and matrix-rtc.<domain>.
rtc:
  enabled: false

  # LiveKit SFU (https://livekit.io/)
  livekit:
    image:
      repository: livekit/livekit-server
      tag: "v1.11.0"
      pullPolicy: IfNotPresent
    replicaCount: 1

    # Shared API key / secret with lk-jwt-service.
    # Generate with: openssl rand -hex 32
    # If both are empty, a Secret must be created out-of-band with keys
    # LIVEKIT_API_KEY and LIVEKIT_API_SECRET (see rtc.livekit.existingSecret).
    apiKey: ""
    apiSecret: ""
    existingSecret: ""  # Optional: name of pre-existing secret

    # LiveKit room-level defaults (rendered under `room:` in config.yaml).
    # All fields optional — the template applies LiveKit's own defaults when
    # a field is unset.
    room:
      # Hard cap on participants per LiveKit room. Raise for large
      # conferences (Element Call UI tolerates ~50). Each active participant
      # adds CPU + egress bandwidth linearly on the SFU pod — bump the
      # deployment's resources proportionally.
      maxParticipants: 16
      # Seconds to keep an empty LiveKit room open before auto-closing.
      # Dropped to 30-60s for ephemeral-call scenarios, raised to 900+ for
      # persistent meeting rooms.
      emptyTimeout: 300
      # Allow SFU to unmute other participants remotely (moderator actions).
      enableRemoteUnmute: true

    # UDP LoadBalancer for WebRTC media (muxed mode = single UDP port for
    # all sessions via SCTP/DTLS). Much cheaper than a port range.
    service:
      # Muxed UDP port advertised to clients for all media traffic.
      udpMuxPort: 7882
      # OVH-specific: annotations for the UDP LoadBalancer.
      annotations: {}
        # loadbalancer.ovhcloud.com/l4-protocol: udp
      loadBalancerIP: ""
      externalTrafficPolicy: Cluster  # Local preserves client IP but needs DSR support
      # Public IP of the UDP LoadBalancer (ICE nat_1to1_ips). REQUIRED on OVH
      # Managed Kubernetes (and any CNI where nodes sit behind a NAT'd LB) —
      # use_external_ip returns the node IP via STUN instead of the LB IP,
      # making ICE candidates unroutable. Leave empty only if your nodes have
      # public IPs directly (K3s / bare metal).
      publicIP: ""
      # external-dns hostname for the UDP endpoint.
      externalDns:
        enabled: false
        hostname: ""  # e.g., livekit.waadoo.ovh
        ttl: 300

    # TURN fallback (for clients behind symmetric NAT).
    # Can reuse the chart's existing coturn deployment.
    turn:
      enabled: false
      # If reuseCoturn=true, LiveKit is configured to use the chart's coturn
      # (internal service DNS). Shared secret is pulled from the coturn
      # credentials secret.
      reuseCoturn: true

    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000

    nodeSelector: {}
    tolerations: []
    affinity: {}

  # lk-jwt-service (https://github.com/element-hq/lk-jwt-service)
  # Minimal service issuing LiveKit JWTs based on Matrix OpenID tokens.
  jwtService:
    image:
      repository: ghcr.io/element-hq/lk-jwt-service
      # NOTE: ghcr publishes without the "v" prefix (0.4.4, not v0.4.4).
      tag: "0.4.4"
      pullPolicy: IfNotPresent
    replicaCount: 1

    # Homeservers whose users get full-access (can auto-create LiveKit rooms).
    # Your own homeserver must be listed here.
    # Empty = auto-populated from synapse.server.name.
    fullAccessHomeservers: []

    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      fsGroup: 10001
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 10001

  # Element Call SPA (https://github.com/element-hq/element-call)
  # Web client served at rtc.ingress.call.host (e.g., call.waadoo.ovh).
  elementCall:
    image:
      repository: ghcr.io/element-hq/element-call
      tag: "v0.19.1"
      pullPolicy: IfNotPresent
    replicaCount: 1

    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 101
      fsGroup: 101
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 101

  # HTTPS Ingress for the Element Call SPA and the MatrixRTC backend (jwt + sfu).
  ingress:
    className: "traefik"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"

    # Element Call SPA (the web app loaded in an iframe by Element Web).
    call:
      host: "call.example.com"
      tls:
        secretName: "matrix-rtc-call-tls"

    # MatrixRTC backend: path routing over a single host.
    #   /livekit/jwt/* -> lk-jwt-service
    #   /livekit/sfu/* -> LiveKit WebSocket (signaling)
    backend:
      host: "matrix-rtc.example.com"
      tls:
        secretName: "matrix-rtc-backend-tls"
