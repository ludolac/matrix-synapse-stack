# Default values for Matrix Synapse Helm chart

# Global settings
global:
  environment: production

# Secrets configuration
secrets:
  # Auto-generate secrets (NOT recommended for production)
  # Set to false and create secrets manually using ./scripts/generate-secrets.sh
  autoGenerate: false

# Bootstrap the target Namespace as part of the chart.
# Useful for GitOps / ArgoCD: the Namespace is created with sync-wave -10 so
# it exists before any PreSync hook runs. Leave disabled for plain
# `helm install --create-namespace` usage.
namespace:
  create: false
  # ArgoCD sync-wave (lower = applied earlier). -10 is conventional for
  # bootstrap resources that must exist before everything else.
  syncWave: "-10"
  # Extra annotations / labels on the Namespace (merged with the defaults).
  annotations: {}
  labels: {}

# Synapse image configuration
synapse:
  image:
    # Using GitHub Container Registry to avoid Docker Hub rate limits
    repository: ghcr.io/element-hq/synapse
    tag: "v1.151.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  # Service account
  serviceAccount:
    create: true
    annotations: {}
    name: ""

  # Pod annotations
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"

  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 991
    runAsGroup: 991
    fsGroup: 991
    seccompProfile:
      type: RuntimeDefault

  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 991
    runAsGroup: 991

  # Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 8008
    federationPort: 8448
    annotations: {}

  # Resource limits and requests
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

  # Server configuration
  server:
    name: matrix.example.com
    # Registration configuration
    registration:
      enabled: false
      allowGuests: false
      requireEmail: true

    # Initial admin user configuration
    # This creates an admin user during initial deployment using a Kubernetes Job
    adminUser:
      enabled: false
      # Username (without @:domain, will be @username:matrix.example.com)
      username: "admin"
      # Password for the admin user
      # IMPORTANT: Change this or provide via secret in production!
      password: "ChangeMe123!"
      # Email address (optional)
      email: ""
      # Make user a server admin
      admin: true
      # Display name (optional)
      displayName: "Administrator"
      # Registration shared secret (required for user creation)
      # Generate with: openssl rand -hex 32
      # IMPORTANT: Change this in production!
      registrationSecret: ""

    # Report stats to matrix.org
    reportStats: false

    # Media storage
    media:
      maxUploadSize: "50M"
      maxImagePixels: "32M"

    # URL previews
    urlPreviews:
      enabled: true

    # TURN server configuration for VoIP/Video calls
    # TURN (Traversal Using Relays around NAT) is required for WebRTC calls to work
    # when users are behind NAT/firewalls
    turn:
      enabled: false
      # TURN server URIs - supports both UDP/TCP and secure TURNS
      uris: []
        # - "turn:turn.example.com:3478?transport=udp"
        # - "turn:turn.example.com:3478?transport=tcp"
        # - "turns:turn.example.com:5349?transport=udp"  # Secure TURN over TLS
        # - "turns:turn.example.com:5349?transport=tcp"
      # Shared secret is read from Kubernetes secret: matrix-synapse-turn-credentials
      # Generate with: ./scripts/generate-secrets.sh turn
      # DO NOT set sharedSecret here - it's automatically injected from the secret
      sharedSecret: ""  # Deprecated - will be removed, use Kubernetes secret
      # How long TURN credentials are valid
      userLifetime: "1h"

    # Email configuration
    email:
      enabled: false
      smtpHost: localhost
      smtpPort: 25
      smtpUser: ""
      smtpPass: ""
      requireTransportSecurity: true
      notifFrom: "Matrix <noreply@example.com>"
      appName: "Matrix"
      # Public URL of the Element Web instance. Used in room-invite email
      # links (e.g. "Accept invite" button). Leave empty to fall back to
      # Synapse's default (https://app.element.io).
      clientBaseUrl: ""

    # Multi-Factor Authentication (MFA) / Two-Factor Authentication (2FA)
    mfa:
      # Enable TOTP (Time-based One-Time Password) - QR code authentication
      # Note: TOTP is available by default in Synapse, users can enable it via Element Web
      # These settings allow customization of TOTP behavior
      totp:
        enabled: true  # Enable TOTP support (enabled by default)
        # TOTP algorithm (sha1, sha256, sha512)
        algorithm: "sha1"
        # Number of digits in TOTP code (6 or 8)
        digits: 6
        # Time period in seconds for TOTP code validity
        period: 30
        # Brand name shown in authenticator apps
        issuer: "Matrix"

      # WebAuthn/FIDO2 support (hardware security keys like YubiKey)
      webauthn:
        enabled: false
        # Relying Party (RP) ID - usually your domain
        rpId: ""  # e.g., "matrix.example.com"
        # Relying Party name shown to users
        rpName: "Matrix Homeserver"

    # SSO (Single Sign-On) configuration
    sso:
      enabled: false

      # OpenID Connect (OIDC) providers
      oidc:
        enabled: false
        providers: []
        # Example configurations for common providers:
        #
        # # Google
        # - idp_id: google
        #   idp_name: "Google"
        #   idp_icon: "mxc://matrix.org/google-icon"
        #   discover: true
        #   issuer: "https://accounts.google.com/"
        #   client_id: "your-client-id.apps.googleusercontent.com"
        #   client_secret: "your-client-secret"
        #   scopes: ["openid", "profile", "email"]
        #   user_mapping:
        #     localpart_template: "{{ user.email.split('@')[0] }}"
        #     display_name_template: "{{ user.name }}"
        #     email_template: "{{ user.email }}"
        #
        # # GitHub
        # - idp_id: github
        #   idp_name: "GitHub"
        #   discover: false
        #   issuer: "https://github.com/"
        #   client_id: "your-github-client-id"
        #   client_secret: "your-github-client-secret"
        #   authorization_endpoint: "https://github.com/login/oauth/authorize"
        #   token_endpoint: "https://github.com/login/oauth/access_token"
        #   userinfo_endpoint: "https://api.github.com/user"
        #   scopes: ["read:user", "user:email"]
        #   user_mapping:
        #     localpart_template: "{{ user.login }}"
        #     display_name_template: "{{ user.name }}"
        #     email_template: "{{ user.email }}"
        #
        # # Keycloak / Authentik
        # - idp_id: keycloak
        #   idp_name: "Corporate SSO"
        #   discover: true
        #   issuer: "https://sso.example.com/auth/realms/master"
        #   client_id: "matrix"
        #   client_secret: "your-client-secret"
        #   scopes: ["openid", "profile", "email"]
        #   user_mapping:
        #     localpart_template: "{{ user.preferred_username }}"
        #     display_name_template: "{{ user.name }}"
        #     email_template: "{{ user.email }}"
        #   allow_existing_users: true
        #
        # # Azure AD / Entra ID
        # - idp_id: microsoft
        #   idp_name: "Microsoft"
        #   discover: true
        #   issuer: "https://login.microsoftonline.com/{tenant-id}/v2.0"
        #   client_id: "your-application-id"
        #   client_secret: "your-client-secret"
        #   scopes: ["openid", "profile", "email"]
        #   user_mapping:
        #     localpart_template: "{{ user.preferred_username.split('@')[0] }}"
        #     display_name_template: "{{ user.name }}"
        #     email_template: "{{ user.email }}"

      # SAML2 configuration
      saml2:
        enabled: false
        metadata_url: ""  # URL to IdP metadata XML
        entity_id: ""     # Optional: SP entity ID
        mxid_source_attribute: "uid"  # SAML attribute for username
        mxid_mapping: "dotreplace"    # Optional: how to map username

  # Database connection pool (psycopg2). The database host / user / password
  # are derived automatically from the `postgresql` section (cnpg | standalone
  # | external mode). Override here only if you need tuning.
  database:
    cpMin: 5
    cpMax: 10

  # Signing key secret (required)
  signingKey:
    existingSecret: ""
    secretKey: "signing.key"

  # Persistence for media and uploads
  persistence:
    enabled: true
    storageClassName: "standard"
    accessMode: ReadWriteOnce
    size: 10Gi
    mountPath: /data

  # Metrics
  metrics:
    enabled: true
    port: 9090

  # Probes
  livenessProbe:
    httpGet:
      path: /health
      port: 8008
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 8008
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  # Note: Matrix Authentication Service (MAS) integration is now a top-level
  # section `mas:` at the bottom of this file. When `mas.enabled=true`, Synapse
  # is automatically configured with MSC3861 delegated auth and the legacy
  # password_config / oidc_providers / registration_shared_secret blocks are
  # removed (they conflict with MSC3861).

  startupProbe:
    httpGet:
      path: /health
      port: 8008
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30

# Element Web configuration
element:
  enabled: true

  image:
    repository: ghcr.io/element-hq/element-web
    tag: "v1.12.15"
    pullPolicy: IfNotPresent

  replicaCount: 2

  # Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
    annotations: {}

  # Resource limits
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Element configuration
  config:
    defaultServerName: matrix.example.com
    defaultServerUrl: "https://matrix.example.com"
    brandingUrl: "https://element.io"
    roomDirectory:
      servers:
        - matrix.org
    welcomeUserId: ""
    # Features
    features:
      showLabsSettings: false
      enableWidgets: true
    # Integration manager
    integrations:
      enabled: true
      uiUrl: "https://scalar.vector.im/"
      restUrl: "https://scalar.vector.im/api"
      widgetsUrls:
        - "https://scalar.vector.im/_matrix/integrations/v1"
        - "https://scalar.vector.im/api"
    # Branding and theming
    branding:
      # Custom logo URL (appears in top-left)
      authHeaderLogoUrl: ""
      # Welcome background image (login/register page)
      welcomeBackgroundUrl: ""
      # Custom CSS for additional styling
      customCssUrl: ""

  # Security context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault

# Ingress configuration
ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"

  # Synapse (Matrix homeserver)
  synapse:
    host: matrix.example.com
    paths:
      - path: /
        pathType: Prefix
    tls:
      secretName: matrix-synapse-tls

  # Element Web
  element:
    host: element.example.com
    paths:
      - path: /
        pathType: Prefix
    tls:
      secretName: matrix-element-tls

  # Federation (port 8448)
  federation:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: "matrix-federation"

# Autoscaling for Element
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Network policy
# Creates separate NetworkPolicies for each component (Synapse, Element, PostgreSQL, Well-known)
# with fine-grained ingress and egress rules
networkPolicy:
  enabled: false  # Set to true to enable NetworkPolicies

  # Ingress configuration (who can access our pods)
  ingress:
    # Traefik ingress controller configuration
    traefik:
      # Namespace selector for Traefik
      namespaceSelector:
        name: traefik
      # Pod selector for Traefik (optional - if not set, allows from any pod in traefik namespace)
      podSelector: {}

  # Egress configuration (what our pods can access)
  egress:
    # SSO provider configuration (e.g., Authelia)
    sso:
      # Namespace where SSO provider is running
      namespaceSelector:
        kubernetes.io/metadata.name: authentif
      # Pod selector for SSO provider (optional)
      podSelector: {}

# PostgreSQL configuration
#
# Deployment mode:
#   cnpg       -> CloudNativePG operator (HA, recommended for production)
#                 Prerequisite: CNPG operator installed cluster-wide.
#                 Docs: https://cloudnative-pg.io/documentation/
#   standalone -> Single-instance PostgreSQL managed by this chart (no HA).
#                 Use for dev/test or simple homelab setups.
#   external   -> Bring your own PostgreSQL; configure postgresql.external.
postgresql:
  mode: cnpg

  # Common database/user (applies to all modes)
  database: synapse
  username: synapse

  # ---------------------------------------------------------------------------
  # CloudNativePG (HA, recommended)
  # ---------------------------------------------------------------------------
  cnpg:
    # Number of PostgreSQL instances (1 primary + N-1 replicas).
    # 3 = production HA (1 primary, 2 hot standbys). 1 = no HA.
    instances: 3

    # Synchronous replication (0 = asynchronous, safest for write latency).
    # Increase for zero-data-loss guarantees at the cost of write latency.
    minSyncReplicas: 0
    maxSyncReplicas: 0

    # CNPG-compatible PostgreSQL image (must include the CNPG extensions)
    imageName: ghcr.io/cloudnative-pg/postgresql:17.9

    # Storage configuration (one PVC per instance)
    storage:
      size: 20Gi
      storageClass: "standard"

    # Resources per instance
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi

    # PostgreSQL runtime parameters.
    # CNPG manages wal_level / max_wal_senders / max_replication_slots
    # automatically - do not override them here.
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      work_mem: "8MB"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"

    # Bootstrap: initial cluster creation.
    # Locale C / encoding UTF8 is REQUIRED by Synapse.
    bootstrap:
      encoding: UTF8
      localeCollate: C
      localeCType: C

    # Prometheus PodMonitor (scraped by prometheus-operator / VictoriaMetrics)
    monitoring:
      enablePodMonitor: true

    # Spread instances across nodes for HA.
    # Use "required" for hard guarantee (needs enough nodes), "preferred" otherwise.
    affinity:
      enablePodAntiAffinity: true
      topologyKey: kubernetes.io/hostname
      podAntiAffinityType: preferred

    # Scheduling
    nodeSelector: {}
    tolerations: []
    priorityClassName: ""

    # Backups to an S3-compatible object store (Barman Cloud).
    # Requires a pre-existing secret with ACCESS_KEY_ID and ACCESS_SECRET_KEY.
    backup:
      enabled: false
      # Retention policy (e.g. "30d", "7d"). Older base backups are pruned.
      retentionPolicy: "30d"
      # Destination: s3://<bucket>/<path>
      destinationPath: ""
      # S3 endpoint (e.g. OVH: https://s3.gra.cloud.ovh.net)
      endpointURL: ""
      # Secret name holding S3 credentials (ACCESS_KEY_ID / ACCESS_SECRET_KEY)
      s3Credentials:
        secretName: ""
      wal:
        compression: gzip
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 2
      # Optional schedule for automated base backups (cron syntax, UTC).
      # Leave empty to disable scheduled backups (manual only).
      scheduledBackup:
        enabled: false
        schedule: "0 0 3 * * *"  # daily at 03:00 UTC
        immediate: true

  # ---------------------------------------------------------------------------
  # Standalone (single-instance, no HA)
  # ---------------------------------------------------------------------------
  standalone:
    image:
      repository: postgres
      tag: "17-alpine"
      pullPolicy: IfNotPresent

    replicaCount: 1

    # Password should be provided via a Kubernetes secret created out-of-band.
    # If set here, a secret named <release>-postgresql is created with this value.
    postgresPassword: ""

    # Synapse requires C locale + UTF8 encoding
    initdbArgs: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"

    # Post-install/upgrade job to align the DB password with the secret.
    # Only needed for password rotation or migration scenarios.
    passwordFixJob:
      enabled: false

    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 999

    persistence:
      storageClassName: "standard"
      size: 20Gi

    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi

    config:
      maxConnections: 200
      sharedBuffers: "256MB"
      effectiveCacheSize: "1GB"
      maintenanceWorkMem: "64MB"
      workMem: "8MB"
      # Single-instance: no replication needed
      walLevel: "minimal"
      maxWalSenders: 0

      # Logging
      logMinDurationStatement: 1000
      logConnections: true
      logDisconnections: true
      logStatementLevel: "notice"
      logStatement: "none"
      logErrorVerbosity: "default"
      logLinePrefix: "%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h "
      logLockWaits: false
      logTempFiles: -1
      logAutovacuumMinDuration: -1

  # ---------------------------------------------------------------------------
  # External (BYO PostgreSQL)
  # ---------------------------------------------------------------------------
  external:
    host: ""
    port: 5432
    # Existing secret containing the DB password under passwordKey
    existingSecret:
      name: ""
      passwordKey: "password"

# Coturn TURN Server Configuration
# Integrated TURN server for WebRTC video/voice calls
# Automatically configured with Matrix Synapse
coturn:
  # Enable coturn TURN server deployment
  enabled: false
  
  # Number of coturn replicas
  replicaCount: 1
  
  # Coturn container image
  image:
    repository: coturn/coturn
    tag: "4.10-alpine"
    pullPolicy: IfNotPresent

  imagePullSecrets: []
  
  # External IP address for TURN relay
  # This should be the public IP where clients can reach the TURN server
  externalIP: ""
  
  # Realm for TURN authentication
  # Usually matches your domain
  realm: "turn.example.com"
  
  # Relay port range for media traffic
  # These ports need to be opened in firewall/security groups
  relayPortRange:
    min: 49152
    max: 49252  # 100 ports (adjust based on expected concurrent calls)

  # Note: User/group privileges are managed by Kubernetes securityContext
  # The coturn container runs as UID/GID 65534 (nobody:nogroup)

  # Resource quotas to prevent abuse
  userQuota: 0        # 0 = no per-user quota
  totalQuota: 100     # Maximum 100 concurrent sessions
  
  # Bandwidth limits (bytes per second)
  maxBps: 0           # 0 = no per-session limit
  bpsCapacity: 0      # 0 = no total capacity limit
  
  # TLS configuration for TURNS (secure TURN)
  tls:
    enabled: false
    # Name of the Kubernetes secret containing tls.crt and tls.key
    secretName: "coturn-tls"
  
  # Prometheus metrics exporter
  prometheusExporter:
    enabled: false
    port: 9641
  
  # Service configuration
  service:
    # Service type: LoadBalancer, NodePort, or ClusterIP
    type: LoadBalancer

    # Publish the whole relayPortRange on the Service.
    # Required when coturn sits behind a LoadBalancer, otherwise media
    # traffic cannot reach the pod (only signaling on 3478/5349 works).
    # WARNING: Kubernetes caps a Service at ~32 ports — keep the range small
    # ((max - min) <= 27, leaving room for signaling + metrics) or use
    # hostNetwork on the pod if you need a larger range.
    publishRelayPorts: false

    # Load balancer IP (optional)
    loadBalancerIP: ""
    
    # External traffic policy (Local or Cluster)
    # Local preserves source IP but requires externalTrafficPolicy support
    externalTrafficPolicy: "Cluster"
    
    # External IPs for the service (optional)
    externalIPs: []
    
    # NodePort configuration (when type=NodePort)
    nodePorts:
      turnUdp: null   # e.g., 30478
      turnTcp: null
      turnsUdp: null  # e.g., 30349
      turnsTcp: null
    
    # Service annotations
    annotations: {}
      # metallb.universe.tf/address-pool: default
      # metallb.universe.tf/allow-shared-ip: coturn
    
    # external-dns configuration
    externalDns:
      enabled: false
      hostname: "turn.example.com"
      ttl: 300
  
  # Ingress configuration for TURNS (TLS)
  # Note: Ingress typically only handles HTTPS/TCP, not UDP
  # For full functionality, use LoadBalancer or NodePort service
  ingress:
    enabled: false
    ingressClassName: ""
    hostname: "turn.example.com"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"
    tls:
      secretName: "coturn-tls"
  
  # Pod annotations
  podAnnotations: {}
    # prometheus.io/scrape: "true"
    # prometheus.io/port: "9641"
  
  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534  # nobody
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  
  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE  # Required for binding to ports < 1024
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
  
  # Resource limits and requests
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 128Mi
  
  # Node selector
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Logging configuration
  logging:
    # Set logging verbosity level
    # Options: "verbose" (default - logs everything), "normal" (moderate), "quiet" (errors only)
    level: "verbose"
    # Log file destination (stdout for container logs)
    file: "stdout"

  # Affinity
  affinity: {}

  # Extra configuration to append to turnserver.conf
  extraConfig: ""
    # Example:
    # |
    # # Custom configuration
    # cli-password=mypassword

# ==============================================================================
# Matrix Authentication Service (MAS)
# ==============================================================================
# Deploys MAS as the authentication/authorization backend for Synapse.
# When enabled, Synapse delegates auth via MSC3861 (OAuth2) and the legacy
# password/OIDC/registration_shared_secret paths are removed from the Synapse
# config (they are incompatible with MSC3861).
#
# Prerequisites:
#   - CNPG operator (CRD `Database` from CNPG 1.25+) — the chart provisions a
#     dedicated DB `mas_prod` in the existing postgresql.cnpg cluster.
#   - An upstream OIDC IdP (e.g. Authelia) — used by MAS to authenticate users.
#   - DNS record: auth.<domain>
#
# Bootstrap flow (no legacy migration — wipe + redeploy):
#   1. Generate cryptographic material: scripts/generate-mas-secrets.sh
#   2. Create Kubernetes secret referenced by mas.existingSecret
#   3. Deploy the chart with mas.enabled=true
#   4. User logs in once via Authelia (creates MAS account linked to OIDC)
#   5. Promote to admin: kubectl exec deploy/<release>-mas -- mas-cli manage \
#        set-admin <localpart> --admin
#
# See README section "Matrix Authentication Service (MAS)" for details.
mas:
  enabled: false

  image:
    repository: ghcr.io/element-hq/matrix-authentication-service
    tag: "1.15.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  # Public URL of MAS — advertised via .well-known and used by Synapse as the
  # OAuth2 issuer. Must match the Ingress host. Pick a hostname dedicated to
  # MAS (e.g. mas.<domain>) — do NOT reuse the hostname of your upstream IdP
  # (Authelia / Keycloak) since both need to be reachable independently.
  publicUrl: "https://mas.example.com/"

  # Database. MAS requires its own PostgreSQL database (not shared with Synapse).
  # When postgresql.mode=cnpg, the chart can provision a dedicated DB via the
  # CNPG `Database` CRD inside the existing cluster.
  database:
    # cnpg: use the chart's existing CNPG cluster and provision mas_prod there
    # external: use an external PostgreSQL, credentials via existingSecret
    mode: cnpg

    # Name of the database and owner role (when mode=cnpg)
    name: mas_prod
    username: mas

    # When mode=external: point to an existing secret with keys
    # DATABASE_HOST, DATABASE_PORT, DATABASE_NAME, DATABASE_USERNAME,
    # DATABASE_PASSWORD.
    external:
      existingSecret: ""

  # Upstream OIDC provider(s) — MAS delegates authentication to these.
  # At least one provider is required. Leave the list empty to disable MAS.
  upstreamOauth2:
    providers: []
      # Example for Authelia:
      # - id: authelia
      #   issuer: "https://authelia.example.com"
      #   clientId: "matrix"          # reuse existing Authelia OIDC client
      #   # Secret key name inside mas.existingSecret holding the client secret:
      #   clientSecretKey: "AUTHELIA_CLIENT_SECRET"
      #   scope: "openid profile email"
      #   claimsImports:
      #     localpart: "{{ user.preferred_username }}"
      #     displayname: "{{ user.name }}"
      #     email: "{{ user.email }}"

  # Secrets for MAS (encryption key, signing keys, Synapse shared secret,
  # admin token). Generate with scripts/generate-mas-secrets.sh and reference
  # the resulting Secret here. The chart will NOT auto-generate these (RSA
  # keys cannot be safely generated from Helm templates).
  existingSecret: ""  # e.g., "matrix-synapse-mas-secrets"

  # Ingress (HTTPS UI + OAuth endpoints). MAS listens on 8080 internally.
  ingress:
    className: "traefik"
    # Must match the hostname in publicUrl above.
    host: "mas.example.com"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"
    tls:
      secretName: "matrix-mas-tls"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ==============================================================================
# MatrixRTC / Element Call (group video calls)
# ==============================================================================
# Deploys the LiveKit SFU + lk-jwt-service + Element Call SPA required for
# group video/voice calls (MSC3401 + MSC4143 + MSC4195).
#
# Architecture:
#   - LiveKit SFU: media server (WebRTC), exposed via HTTPS (WSS) for
#     signaling and via a dedicated UDP LoadBalancer for media (muxed).
#   - lk-jwt-service: authorization service, validates Matrix OpenID tokens
#     and issues short-lived LiveKit JWTs.
#   - Element Call (SPA): web app loaded as widget/iframe by Element Web or
#     ElementX, opened at rtc.ingress.call.host.
#   - Synapse is automatically configured with experimental_features
#     msc3266_enabled + msc4140_enabled (delayed events) when rtc.enabled=true.
#   - The well-known server advertises org.matrix.msc4143.rtc_foci so clients
#     can discover the backend.
#
# Prerequisites:
#   - A second OVH LoadBalancer for the muxed UDP port (cost: ~5€/month).
#   - DNS records: call.<domain> and matrix-rtc.<domain>.
rtc:
  enabled: false

  # LiveKit SFU (https://livekit.io/)
  livekit:
    image:
      repository: livekit/livekit-server
      tag: "v1.11.0"
      pullPolicy: IfNotPresent
    replicaCount: 1

    # Shared API key / secret with lk-jwt-service.
    # Generate with: openssl rand -hex 32
    # If both are empty, a Secret must be created out-of-band with keys
    # LIVEKIT_API_KEY and LIVEKIT_API_SECRET (see rtc.livekit.existingSecret).
    apiKey: ""
    apiSecret: ""
    existingSecret: ""  # Optional: name of pre-existing secret

    # UDP LoadBalancer for WebRTC media (muxed mode = single UDP port for
    # all sessions via SCTP/DTLS). Much cheaper than a port range.
    service:
      # Muxed UDP port advertised to clients for all media traffic.
      udpMuxPort: 7882
      # OVH-specific: annotations for the UDP LoadBalancer.
      annotations: {}
        # loadbalancer.ovhcloud.com/l4-protocol: udp
      loadBalancerIP: ""
      externalTrafficPolicy: Cluster  # Local preserves client IP but needs DSR support
      # external-dns hostname for the UDP endpoint.
      externalDns:
        enabled: false
        hostname: ""  # e.g., livekit.waadoo.ovh
        ttl: 300

    # TURN fallback (for clients behind symmetric NAT).
    # Can reuse the chart's existing coturn deployment.
    turn:
      enabled: false
      # If reuseCoturn=true, LiveKit is configured to use the chart's coturn
      # (internal service DNS). Shared secret is pulled from the coturn
      # credentials secret.
      reuseCoturn: true

    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000

    nodeSelector: {}
    tolerations: []
    affinity: {}

  # lk-jwt-service (https://github.com/element-hq/lk-jwt-service)
  # Minimal service issuing LiveKit JWTs based on Matrix OpenID tokens.
  jwtService:
    image:
      repository: ghcr.io/element-hq/lk-jwt-service
      # NOTE: ghcr publishes without the "v" prefix (0.4.4, not v0.4.4).
      tag: "0.4.4"
      pullPolicy: IfNotPresent
    replicaCount: 1

    # Homeservers whose users get full-access (can auto-create LiveKit rooms).
    # Your own homeserver must be listed here.
    # Empty = auto-populated from synapse.server.name.
    fullAccessHomeservers: []

    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      fsGroup: 10001
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 10001

  # Element Call SPA (https://github.com/element-hq/element-call)
  # Web client served at rtc.ingress.call.host (e.g., call.waadoo.ovh).
  elementCall:
    image:
      repository: ghcr.io/element-hq/element-call
      tag: "v0.19.1"
      pullPolicy: IfNotPresent
    replicaCount: 1

    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 101
      fsGroup: 101
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 101

  # HTTPS Ingress for the Element Call SPA and the MatrixRTC backend (jwt + sfu).
  ingress:
    className: "traefik"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"

    # Element Call SPA (the web app loaded in an iframe by Element Web).
    call:
      host: "call.example.com"
      tls:
        secretName: "matrix-rtc-call-tls"

    # MatrixRTC backend: path routing over a single host.
    #   /livekit/jwt/* -> lk-jwt-service
    #   /livekit/sfu/* -> LiveKit WebSocket (signaling)
    backend:
      host: "matrix-rtc.example.com"
      tls:
        secretName: "matrix-rtc-backend-tls"
