{{- if eq (.Values.postgresql.mode | default "cnpg") "standalone" }}
{{- $cfg := .Values.postgresql.standalone.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "matrix-synapse.fullname" . }}-postgresql-config
  labels:
    {{- include "matrix-synapse.postgresql.labels" . | nindent 4 }}
data:
  postgresql.conf: |
    # PostgreSQL Configuration for Matrix Synapse
    # Optimized for Synapse workload

    # Connection Settings
    max_connections = {{ $cfg.maxConnections }}
    superuser_reserved_connections = 3

    # Memory Settings
    shared_buffers = {{ $cfg.sharedBuffers }}
    effective_cache_size = {{ $cfg.effectiveCacheSize }}
    maintenance_work_mem = {{ $cfg.maintenanceWorkMem }}
    work_mem = {{ $cfg.workMem }}

    # WAL Settings (minimal for single-instance)
    wal_level = {{ $cfg.walLevel }}
    max_wal_senders = {{ $cfg.maxWalSenders }}

    # Query Tuning
    random_page_cost = 1.1
    effective_io_concurrency = 200

    # Logging Configuration
    # Slow query logging
    log_min_duration_statement = {{ $cfg.logMinDurationStatement }}

    # Connection logging
    {{- if $cfg.logConnections }}
    log_connections = on
    {{- else }}
    log_connections = off
    {{- end }}
    {{- if $cfg.logDisconnections }}
    log_disconnections = on
    {{- else }}
    log_disconnections = off
    {{- end }}

    # Statement logging
    {{- if $cfg.logStatement }}
    log_statement = '{{ $cfg.logStatement }}'
    {{- end }}

    # Log level and verbosity
    {{- if $cfg.logStatementLevel }}
    log_min_messages = {{ $cfg.logStatementLevel }}
    {{- end }}
    {{- if $cfg.logErrorVerbosity }}
    log_error_verbosity = {{ $cfg.logErrorVerbosity }}
    {{- end }}

    # Log line format
    {{- if $cfg.logLinePrefix }}
    log_line_prefix = '{{ $cfg.logLinePrefix }}'
    {{- end }}

    # Additional logging options
    {{- if $cfg.logLockWaits }}
    log_lock_waits = on
    {{- else }}
    log_lock_waits = off
    {{- end }}
    {{- if $cfg.logTempFiles }}
    log_temp_files = {{ $cfg.logTempFiles }}
    {{- end }}
    {{- if $cfg.logAutovacuumMinDuration }}
    log_autovacuum_min_duration = {{ $cfg.logAutovacuumMinDuration }}
    {{- end }}

    # Locale and Encoding
    lc_messages = 'C'
    lc_monetary = 'C'
    lc_numeric = 'C'
    lc_time = 'C'

    # Other Settings
    default_text_search_config = 'pg_catalog.english'
{{- end }}
