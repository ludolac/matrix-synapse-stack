{{- if .Values.rtc.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "matrix-synapse.fullname" . }}-livekit-config
  labels:
    {{- include "matrix-synapse.labels" . | nindent 4 }}
    app.kubernetes.io/component: livekit
data:
  config.yaml: |
    # LiveKit SFU configuration.
    # Signaling on TCP 7880 (behind HTTPS/WSS Traefik ingress).
    # Media on UDP {{ .Values.rtc.livekit.service.udpMuxPort }} (muxed — single port for all sessions),
    # exposed by a dedicated UDP LoadBalancer.
    port: 7880
    bind_addresses:
      - "0.0.0.0"

    rtc:
      # Muxed UDP: all media traffic goes through a single UDP port.
      # Drastically reduces LB port count vs. a port_range.
      udp_port: {{ .Values.rtc.livekit.service.udpMuxPort }}
      # Disable the port range (we rely exclusively on udp_mux).
      port_range_start: 0
      port_range_end: 0
      {{- if .Values.rtc.livekit.service.publicIP }}
      # Force the advertised IP in ICE candidates (LiveKit v1.11+).
      # On OVH Managed Kubernetes (and other CNIs where nodes sit behind a LB
      # with SNAT), `use_external_ip: true` learns the NODE IP via STUN, not
      # the LB IP — ICE candidates reference an unroutable address and
      # WebRTC connectivity fails.
      # NOTE: the config key is `node_ip` (single string) in LiveKit v1.11+.
      # `nat_1to1_ips` from older LiveKit versions is rejected at config load.
      node_ip: {{ .Values.rtc.livekit.service.publicIP | quote }}
      {{- else }}
      # STUN-based public IP discovery. Works on flat networks (node has a
      # public IP) but breaks behind a NAT LoadBalancer — use publicIP instead.
      use_external_ip: true
      {{- end }}
      # ICE-Lite: SFU does not act as full ICE agent, simplifies NAT in SFU
      # deployments where clients initiate the connection.
      use_ice_lite: true
      # Application-level packet buffer (independent from kernel rmem). Larger
      # buffer absorbs bursts when kernel rmem is throttled (OVH MKS limits
      # net.core.rmem_max to ~425KB). Default LiveKit: 500/200.
      packet_buffer_size_video: {{ .Values.rtc.livekit.packetBufferSizeVideo | default 1000 }}
      packet_buffer_size_audio: {{ .Values.rtc.livekit.packetBufferSizeAudio | default 400 }}
      # Bandwidth estimation + dynacast. allow_pause lets the SFU pause
      # simulcast layers nobody subscribes to → less CPU on iOS publishers.
      {{- $cc := .Values.rtc.livekit.congestionControl | default dict }}
      congestion_control:
        enabled: {{ $cc.enabled | default true }}
        allow_pause: {{ $cc.allowPause | default true }}
        use_send_side_bwe: {{ $cc.useSendSideBwe | default true }}
        probe_mode: {{ $cc.probeMode | default "padding" | quote }}
      {{- if and .Values.rtc.livekit.turn.enabled .Values.rtc.livekit.turn.reuseCoturn .Values.coturn.enabled }}
      # TURN fallback via the chart's existing coturn deployment (internal).
      # Clients behind symmetric NAT will relay through coturn.
      turn_servers:
        - host: {{ include "matrix-synapse.fullname" . }}-coturn.{{ .Release.Namespace }}.svc.cluster.local
          port: 3478
          protocol: udp
          credential: "${TURN_SHARED_SECRET}"
          username: livekit
      {{- end }}

    # Load keys from mounted secret file (format: "APIkey: secret").
    # Do not put keys inline in this ConfigMap.
    key_file: /etc/livekit/keys.yaml

    # Logging
    logging:
      level: info
      json: false

    # Room settings
    {{- $room := .Values.rtc.livekit.room | default dict }}
    room:
      auto_create: false           # Let lk-jwt-service authorize room creation
      enable_remote_unmute: {{ $room.enableRemoteUnmute | default true }}
      # max_participants is a HARD cap enforced by the SFU. Raise when running
      # large conferences (Element Call's default UI caps at ~50). Each active
      # participant adds CPU + bandwidth load linearly on the SFU pod.
      max_participants: {{ $room.maxParticipants | default 16 }}
      # Seconds to keep an empty LiveKit room open before auto-closing.
      empty_timeout: {{ $room.emptyTimeout | default 300 }}
      # Codec ordering. Lists H.264 first to favour iOS hardware encode/decode
      # (saves CPU on Element X mobile, especially with E2EE Insertable Streams);
      # VP8 second for browser compatibility (Firefox lacks H.264 in many builds).
      # Override via .Values.rtc.livekit.room.enabledCodecs.
      # WARNING: do not list H.264 alone — breaks Firefox (livekit#3404).
      enabled_codecs:
        {{- with $room.enabledCodecs }}
        {{- toYaml . | nindent 8 }}
        {{- else }}
        - mime: video/h264
        - mime: video/vp8
        - mime: audio/opus
        - mime: audio/red
        {{- end }}

    # Note: livekit-server does not accept a top-level `health:` block.
    # Health is always served on the signaling port (HTTP GET / returns 200).
    # Probes in the Deployment hit that path directly.
{{- end }}
