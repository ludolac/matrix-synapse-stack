{{- if and .Values.mas.enabled (eq .Values.mas.database.mode "cnpg") }}
{{- if ne (.Values.postgresql.mode | default "cnpg") "cnpg" -}}
{{- fail "mas.database.mode=cnpg requires postgresql.mode=cnpg (the chart-managed Cluster). Set mas.database.mode=external to bring your own DB." -}}
{{- end }}
# Declarative database creation via CNPG 1.25+ Database CRD.
# The operator creates mas_prod inside the existing Synapse Cluster with the
# locale/encoding settings required by Matrix software.
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: {{ printf "%s-mas" (include "matrix-synapse.postgresql.cnpgClusterName" .) }}
  labels:
    {{- include "matrix-synapse.labels" . | nindent 4 }}
    app.kubernetes.io/component: mas
spec:
  cluster:
    name: {{ include "matrix-synapse.postgresql.cnpgClusterName" . }}
  # CNPG Database CRD uses camelCase (Kubernetes convention). Emitting the
  # snake_case variants is silently ignored by the API server and causes an
  # infinite drift loop with ArgoCD as the webhook keeps filling in defaults.
  ensure: present
  name: {{ .Values.mas.database.name }}
  # Reuse the Synapse role as owner (dev-friendly). For production isolation,
  # add a dedicated role via the Cluster's managed.roles and override this.
  owner: {{ .Values.postgresql.username }}
  encoding: UTF8
  localeCollate: C
  localeCType: C
  # Do not drop the DB when the Database CR is deleted (safety on uninstall).
  databaseReclaimPolicy: retain
{{- end }}
