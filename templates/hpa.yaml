{{/*
HPA helper: emits one HorizontalPodAutoscaler per component whose
autoscaling config has `enabled: true`.

Covered today:
  - element            via   .Values.autoscaling      (legacy top-level; kept for backward compat)
  - synapse            via   .Values.synapse.autoscaling
  - mas                via   .Values.mas.autoscaling

NOT covered (intentional):
  - LiveKit / RTC      holds sticky WebRTC sessions per pod. HPA scale-down
                       during active calls would drop participants. Out of
                       scope until we have a proper session-drain mechanism
                       (pre-stop hook migrating rooms). Scale manually via
                       rtc.livekit.replicaCount instead.
*/}}

{{- define "matrix-synapse.hpa" -}}
{{- $ := .ctx -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .name }}
  labels:
    {{- include "matrix-synapse.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .component }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .name }}
  minReplicas: {{ .cfg.minReplicas }}
  maxReplicas: {{ .cfg.maxReplicas }}
  metrics:
    {{- with .cfg.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
    {{- with .cfg.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
  {{- with .cfg.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end -}}

{{- $fullname := include "matrix-synapse.fullname" . }}
{{- /* Element (top-level .Values.autoscaling, legacy) */}}
{{- if .Values.autoscaling.enabled }}
{{- include "matrix-synapse.hpa" (dict "ctx" . "name" (printf "%s-element" $fullname) "component" "element-web" "cfg" .Values.autoscaling) }}
---
{{- end }}
{{- /* Synapse */}}
{{- with .Values.synapse.autoscaling }}
{{- if .enabled }}
{{- include "matrix-synapse.hpa" (dict "ctx" $ "name" (printf "%s-synapse" $fullname) "component" "synapse" "cfg" .) }}
---
{{- end }}
{{- end }}
{{- /* MAS (only when MAS itself is enabled) */}}
{{- if .Values.mas.enabled }}
{{- with .Values.mas.autoscaling }}
{{- if .enabled }}
{{- include "matrix-synapse.hpa" (dict "ctx" $ "name" (printf "%s-mas" $fullname) "component" "mas" "cfg" .) }}
{{- end }}
{{- end }}
{{- end }}
