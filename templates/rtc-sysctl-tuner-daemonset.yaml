{{- if and .Values.rtc.enabled .Values.rtc.livekit.sysctlTuner.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "matrix-synapse.fullname" . }}-livekit-sysctl-tuner
  labels:
    {{- include "matrix-synapse.labels" . | nindent 4 }}
    app.kubernetes.io/component: livekit-sysctl-tuner
  annotations:
    matrix-synapse.chart/description: |
      DaemonSet (hostNetwork + CAP_NET_ADMIN) that bumps net.core.rmem_max /
      wmem_max on every node so LiveKit (running as a regular pod) inherits
      a UDP receive buffer >= 5MB. Required workaround when the kubelet does
      not allow unsafe sysctls (OVH MKS, GKE, EKS managed nodepools).
spec:
  selector:
    matchLabels:
      {{- include "matrix-synapse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: livekit-sysctl-tuner
  template:
    metadata:
      labels:
        {{- include "matrix-synapse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: livekit-sysctl-tuner
    spec:
      hostNetwork: true
      # hostPID volontairement retiré : non nécessaire pour modifier net.core.*
      {{- with .Values.rtc.livekit.sysctlTuner.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        {{- with .Values.rtc.livekit.sysctlTuner.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- else }}
        # Par défaut on ne tolère aucun taint : le DaemonSet ne tournera que
        # sur les nœuds workers standards qui hébergent LiveKit.
        []
        {{- end }}
      # runc monte /proc/sys en read-only par défaut pour les conteneurs
      # non-privilégiés. On bind-mount le /proc/sys/net de l'hôte à un chemin
      # HORS de /proc (proc-safety check de runc post-CVE-2024-21626 interdit
      # les bind-mounts depuis /proc vers /proc dans le container).
      # Combiné à hostNetwork + CAP_NET_ADMIN, cela permet de modifier
      # net.core.* sans mode privilégié.
      volumes:
        - name: host-proc-sys-net
          hostPath:
            path: /proc/sys/net
            type: Directory
      containers:
        - name: sysctl-tuner
          image: {{ .Values.rtc.livekit.sysctlTuner.image | default "busybox:1.37" | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              # NOTE: `int` is required to force a decimal representation;
              # without it, Helm renders 7500000 as "7.5e+06" which `sysctl -w`
              # rejects with "Invalid argument" (chart 2.0.32 regression).
              RMEM={{ int (.Values.rtc.livekit.sysctlTuner.rmemMax | default 7500000) }}
              WMEM={{ int (.Values.rtc.livekit.sysctlTuner.wmemMax | default 7500000) }}
              # Écriture directe dans le procfs hôte bind-mounté à /host-net
              # (hors de /proc pour passer le proc-safety check de runc).
              echo "Setting net.core.rmem_max=$RMEM"
              echo "$RMEM" > /host-net/core/rmem_max
              echo "Setting net.core.wmem_max=$WMEM"
              echo "$WMEM" > /host-net/core/wmem_max
              # Re-apply periodically in case of node-level reset (kubelet
              # restart, sysctl conflicts with another DaemonSet, etc.).
              while true; do
                sleep 3600
                echo "$RMEM" > /host-net/core/rmem_max
                echo "$WMEM" > /host-net/core/wmem_max
              done
          volumeMounts:
            - name: host-proc-sys-net
              mountPath: /host-net
              readOnly: false
          securityContext:
            # Plus de privileged: true — CAP_NET_ADMIN + bind-mount /proc/sys/net
            # suffisent pour modifier net.core.* dans le netns hôte.
            privileged: false
            allowPrivilegeEscalation: false
            runAsNonRoot: false  # écriture dans /proc/sys requiert UID 0
            runAsUser: 0
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_ADMIN"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              cpu: 50m
              memory: 32Mi
            requests:
              cpu: 10m
              memory: 16Mi
{{- end }}
