{{- if and .Values.rtc.enabled (not .Values.rtc.livekit.existingSecret) }}
{{- $apiKey := .Values.rtc.livekit.apiKey -}}
{{- $apiSecret := .Values.rtc.livekit.apiSecret -}}
{{- if or (not $apiKey) (not $apiSecret) -}}
{{- fail "rtc.livekit.apiKey and rtc.livekit.apiSecret must be set (or provide rtc.livekit.existingSecret). Generate with: openssl rand -hex 32" -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "matrix-synapse.fullname" . }}-livekit
  labels:
    {{- include "matrix-synapse.labels" . | nindent 4 }}
    app.kubernetes.io/component: livekit
type: Opaque
stringData:
  # API key/secret used by both LiveKit and lk-jwt-service. LiveKit
  # authenticates JWTs signed with this secret against the matching key.
  LIVEKIT_API_KEY: {{ $apiKey | quote }}
  LIVEKIT_API_SECRET: {{ $apiSecret | quote }}
  # LiveKit key file format (key: secret). Mounted into the SFU pod.
  keys.yaml: |
    {{ $apiKey }}: {{ $apiSecret }}
{{- end }}
